<!DOCTYPE html>
<html>
<head>
  <title>Search Machine</title>
  <link rel="stylesheet" href="dashboard.css">

  <style>
    body {
      background: #f5f7f9;
      font-size: 14px;
    }

    /* TOP BAR */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .branch-title {
      background: #4f6f64;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #4f6f64;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    .btn:hover {
      background: #3d5a50;
    }

    /* SEARCH BAR */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    /* FULL WIDTH */
    .main {
      width: 100%;
    }

    table th, table td {
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="main">

<div class="main">

  <!-- HEADER -->
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:15px;">
      <strong id="branchTitle" style="font-size:16px; color:#4f6f64;"></strong>
      <span id="usernameDisplay"></span>
    </div>

    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="goBack()">⬅ Back</button>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <!-- SEARCH -->
  <div class="search-bar">
    <input id="machineInput" placeholder="Machine No" maxlength="7" style="width:180px;">
    <button class="btn" onclick="searchMachine()">Search</button>
  </div>

  <!-- TABLE -->
  <div class="table">
    <table id="resultTable">
      <thead>
        <tr>
          <th>Date</th>
          
          <th>Engineer</th>
          <th>Workshop/Onsite</th>
          <th>Call Type</th>
          <th>Complaint</th>
          <th>Customer</th>
          <th>Machine No</th>
          <th>HMR</th>
          <th>Status</th>
          <th>Site</th>
          <th>Call ID</th>
          <th>Labour</th>
          <th>Distance</th>
          <th>Total TA/DA</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="search.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA DA Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>TA DA</h2>

    <ul>
      
     <li onclick="openBranchModal()">➕ New List</li>




      
      <li onclick="showSection('reports')">📊 Reports</li>

    </ul>




<div style="position:absolute; bottom:20px; width:180px;">
  <li onclick="logout()">🚪 Logout</li>
</div>

    
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <input type="text" placeholder="Search..." />
      <span id="usernameDisplay"></span>
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total Claims</h3>
        <p>₹948</p>
      </div>
      <div class="card">
        <h3>Pending</h3>
        <p>₹145.50</p>
      </div>
      <div class="card">
        <h3>Approved</h3>
        <p>14</p>
      </div>
    </div>





    
    <!-- TABLE -->
    <div class="table">
      <table>
<thead>
  <tr>
<th>List ID</th>
<th>Location</th>
<th>Status</th>
<th>SVR Count</th>
<th>Total TA/DA</th>
<th>Passed TA/DA</th>
<th>Created At</th>
  </tr>
</thead>
        
         <tbody id="listTableBody"></tbody>
        
      </table>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dashboard.js"></script>


<!-- BRANCH MODAL -->
<div id="branchModal" class="modal">
  <div class="modal-content">
    <h3>Select Branch</h3>

    <div class="branch-grid">
      <button onclick="openBranch('DAMOH')">DAMOH</button>
      <button onclick="openBranch('DINDORI')">DINDORI</button>
      <button onclick="openBranch('ANUPPUR')">ANUPPUR</button>
      <button onclick="openBranch('MANDLA')">MANDLA</button>
      <button onclick="openBranch('NARSINGHPUR')">NARSINGHPUR</button>
      <button onclick="openBranch('KATNI')">KATNI</button>
      <button onclick="openBranch('SEONI')">SEONI</button>
      <button onclick="openBranch('BALAGHAT')">BALAGHAT</button>
      <button onclick="openBranch('JABALPUR')">JABALPUR</button>
    </div>

    <button onclick="closeModal()" class="close-btn">Close</button>
  </div>
</div>


<div id="loader" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:1000;
">
  <div style="
    background:white;
    padding:20px 30px;
    border-radius:10px;
    font-size:16px;
  ">
    Creating List...
  </div>
</div>

  
</body>
</html>

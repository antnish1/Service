<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA DA Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>TA DA</h2>

    <ul>
      
      <li onclick="toggleBranches()">➕ New List</li>
      <li onclick="showSection('reports')">📊 Reports</li>

    </ul>


<div id="branchContainer" style="display:none; margin-top:10px;">
  <button onclick="openBranch('DAMOH')">DAMOH</button>
  <button onclick="openBranch('DINDORI')">DINDORI</button>
  <button onclick="openBranch('ANUPPUR')">ANUPPUR</button>
  <button onclick="openBranch('MANDLA')">MANDLA</button>
  <button onclick="openBranch('NARSINGHPUR')">NARSINGHPUR</button>
  <button onclick="openBranch('KATNI')">KATNI</button>
  <button onclick="openBranch('SEONI')">SEONI</button>
  <button onclick="openBranch('BALAGHAT')">BALAGHAT</button>
  <button onclick="openBranch('JABALPUR')">JABALPUR</button>
</div>

<div style="position:absolute; bottom:20px; width:180px;">
  <li onclick="logout()">🚪 Logout</li>
</div>

    
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <input type="text" placeholder="Search..." />
      <span id="usernameDisplay"></span>
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total Claims</h3>
        <p>₹948</p>
      </div>
      <div class="card">
        <h3>Pending</h3>
        <p>₹145.50</p>
      </div>
      <div class="card">
        <h3>Approved</h3>
        <p>14</p>
      </div>
    </div>





    
    <!-- TABLE -->
    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Claim ID</th>
            <th>Category</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#001</td>
            <td>Travel</td>
            <td>23/04/24</td>
            <td>₹200</td>
            <td><span class="status approved">Approved</span></td>
          </tr>
          <tr>
            <td>#002</td>
            <td>Food</td>
            <td>23/04/24</td>
            <td>₹150</td>
            <td><span class="status pending">Pending</span></td>
          </tr>
          <tr>
            <td>#003</td>
            <td>Hotel</td>
            <td>22/04/24</td>
            <td>₹500</td>
            <td><span class="status rejected">Rejected</span></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>

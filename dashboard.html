<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA DA Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">



  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
<div class="topbar">

  <!-- LEFT -->
  <div class="topbar-left">
    <input type="text" placeholder="Search..." />
  </div>

  <!-- RIGHT -->
  <div class="topbar-right">
<span id="usernameDisplay"></span>
    <button class="top-btn" onclick="openBranchModal()">➕ New List</button>
    <button class="top-btn" onclick="showSection('reports')">📊 Reports</button>

    

    <button class="logout-btn" onclick="logout()">🚪 Logout</button>

  </div>

</div>

<div class="mega-cards">

  <!-- LIST STATUS CARD -->
  <div class="mega-card">
    <h3>📋 List Status</h3>

    <div class="mini-stats">
      <div class="mini" onclick="applyFilter('open', this)">
        <span>Open</span>
        <strong id="openCount">0</strong>
      </div>

      <div class="mini" onclick="applyFilter('closed', this)">
        <span>Closed</span>
        <strong id="closedCount">0</strong>
      </div>

      <div class="mini" onclick="applyFilter('verified', this)">
        <span>Verified</span>
        <strong id="verifiedCount">0</strong>
      </div>

      <div class="mini highlight" onclick="applyFilter('pending', this)">
        <span>Total Pending</span>
        <strong id="totalPending">0</strong>
      </div>
    </div>
  </div>

  <!-- CLAIM STATUS CARD -->
  <div class="mega-card">
    <h3>💰 Claim Status</h3>

    <div class="mini-stats">
      <div class="mini" onclick="applyFilter('all', this)">
        <span>Total SVR</span>
        <strong id="totalSVR">0</strong>
      </div>

      <div class="mini" onclick="applyFilter('unverified', this)">
        <span>Unverified</span>
        <strong id="unverifiedAmt">₹0</strong>
      </div>

      <div class="mini" onclick="applyFilter('verified_claim', this)">
        <span>Verified</span>
        <strong id="verifiedAmt">₹0</strong>
      </div>

      <div class="mini highlight" onclick="applyFilter('passed', this)">
        <span>Passed</span>
        <strong id="passedAmt">₹0</strong>
      </div>
    </div>
  </div>

</div>



    
    <!-- TABLE -->
    <div class="table">
      <table>
<thead>
  <tr>
<th>List ID</th>
<th>Location</th>
<th>Status</th>
<th>SVR Count</th>
<th>Total TA/DA</th>
<th>Passed TA/DA</th>
<th>Created At</th>
  </tr>
</thead>
        
         <tbody id="listTableBody"></tbody>
        
      </table>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dashboard.js"></script>


<!-- BRANCH MODAL -->
<div id="branchModal" class="modal">
  <div class="modal-content">
    <h3>Select Branch</h3>

    <div class="branch-grid">
      <button onclick="openBranch('DAMOH')">DAMOH</button>
      <button onclick="openBranch('DINDORI')">DINDORI</button>
      <button onclick="openBranch('ANUPPUR')">ANUPPUR</button>
      <button onclick="openBranch('MANDLA')">MANDLA</button>
      <button onclick="openBranch('NARSINGHPUR')">NARSINGHPUR</button>
      <button onclick="openBranch('KATNI')">KATNI</button>
      <button onclick="openBranch('SEONI')">SEONI</button>
      <button onclick="openBranch('BALAGHAT')">BALAGHAT</button>
      <button onclick="openBranch('JABALPUR')">JABALPUR</button>
    </div>

    <button onclick="closeModal()" class="close-btn">Close</button>
  </div>
</div>


<div id="loader" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:1000;
">
  <div style="
    background:white;
    padding:20px 30px;
    border-radius:10px;
    font-size:16px;
  ">
    Creating List...
  </div>
</div>

  
</body>
</html>

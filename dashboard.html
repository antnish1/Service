<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA DA Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">



  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
<div class="topbar">

  <!-- LEFT -->
  <div class="topbar-left">
    <input type="text" placeholder="Search..." />
  </div>

  <!-- RIGHT -->
  <div class="topbar-right">

    <button class="top-btn" onclick="openBranchModal()">➕ New List</button>
    <button class="top-btn" onclick="showSection('reports')">📊 Reports</button>

    <span id="usernameDisplay"></span>

    <button class="logout-btn" onclick="logout()">🚪 Logout</button>

  </div>

</div>

<!-- LIST STATUS CARDS -->
<div class="card-section">
  <h3>List Status</h3>
  <div class="cards" id="listStatusCards">
    <div class="card gradient-green">
      <h4>Open</h4>
      <p id="openCount">0</p>
    </div>
    <div class="card gradient-red">
      <h4>Closed</h4>
      <p id="closedCount">0</p>
    </div>
    <div class="card gradient-blue">
      <h4>Verified</h4>
      <p id="verifiedCount">0</p>
    </div>
    <div class="card gradient-purple">
      <h4>Total Pending</h4>
      <p id="totalPending">0</p>
    </div>
  </div>
</div>

<!-- CLAIM STATUS CARDS -->
<div class="card-section">
  <h3>Claim Status</h3>
  <div class="cards" id="claimStatusCards">
    <div class="card gradient-dark">
      <h4>Total SVRs</h4>
      <p id="totalSVR">0</p>
    </div>
    <div class="card gradient-orange">
      <h4>Unverified Amount</h4>
      <p id="unverifiedAmt">₹0</p>
    </div>
    <div class="card gradient-teal">
      <h4>Verified Amount</h4>
      <p id="verifiedAmt">₹0</p>
    </div>
    <div class="card gradient-pink">
      <h4>Passed Amount</h4>
      <p id="passedAmt">₹0</p>
    </div>
  </div>
</div>




    
    <!-- TABLE -->
    <div class="table">
      <table>
<thead>
  <tr>
<th>List ID</th>
<th>Location</th>
<th>Status</th>
<th>SVR Count</th>
<th>Total TA/DA</th>
<th>Passed TA/DA</th>
<th>Created At</th>
  </tr>
</thead>
        
         <tbody id="listTableBody"></tbody>
        
      </table>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dashboard.js"></script>


<!-- BRANCH MODAL -->
<div id="branchModal" class="modal">
  <div class="modal-content">
    <h3>Select Branch</h3>

    <div class="branch-grid">
      <button onclick="openBranch('DAMOH')">DAMOH</button>
      <button onclick="openBranch('DINDORI')">DINDORI</button>
      <button onclick="openBranch('ANUPPUR')">ANUPPUR</button>
      <button onclick="openBranch('MANDLA')">MANDLA</button>
      <button onclick="openBranch('NARSINGHPUR')">NARSINGHPUR</button>
      <button onclick="openBranch('KATNI')">KATNI</button>
      <button onclick="openBranch('SEONI')">SEONI</button>
      <button onclick="openBranch('BALAGHAT')">BALAGHAT</button>
      <button onclick="openBranch('JABALPUR')">JABALPUR</button>
    </div>

    <button onclick="closeModal()" class="close-btn">Close</button>
  </div>
</div>


<div id="loader" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:1000;
">
  <div style="
    background:white;
    padding:20px 30px;
    border-radius:10px;
    font-size:16px;
  ">
    Creating List...
  </div>
</div>

  
</body>
</html>
